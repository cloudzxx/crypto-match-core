grpc:
  addr: "0.0.0.0:7316"

pg:
  host: "localhost"
  port: 5432
  name: "matchengine"
  user: "postgres"
  password: ""
  max_conns: 20

kafka:
  brokers:
    - "127.0.0.1:9092"
  topics:
    orders: "matchengine.orders"
    deals: "matchengine.deals"
    balances: "matchengine.balances"
  batch_ms: 100

slice:
  interval: 3600
  keeptime: 259200

assets:
  - name: "BTC"
    prec_save: 12
    prec_show: 8
  - name: "USDT"
    prec_save: 12
    prec_show: 8
  - name: "ETH"
    prec_save: 12
    prec_show: 8

markets:
  - name: "BTCUSDT"
    stock: "BTC"
    money: "USDT"
    stock_prec: 8
    money_prec: 8
    min_amount: "0.001"
  - name: "ETHBTC"
    stock: "ETH"
    money: "BTC"
    stock_prec: 8
    money_prec: 8
    min_amount: "0.01"